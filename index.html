<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>oscar elizondo's blog</title>
	<link rel="stylesheet" href="dist/css/style.css">
	<link href='http://fonts.googleapis.com/css?family=Lato' rel='stylesheet' type='text/css'>
</head>
<body ng-app='myApp'>
	<aside>
		<h1>oscar elizondo</h1>
		<p><i>all of my what</i></p>
		<nav>
			<ul>
				<li><a href="">github</a></li>
				<li><a href="">twitter</a></li>
				<li><a href="">contact</a></li>
			</ul>
			<input type="text" ng-model='search' placeholder="search for an entry">
		</nav>
	</aside>
	<section ng-controller='MainCtrl' class='blog'>
		<div ng-repeat='blog in blogArt | filter:search' class="micro-post">
			<div class="title">
				<h2>{{blog.name}}</h2>
				<small>{{blog.date}}</small>
			</div>
			<div class="body">
				<p>{{blog.body}}</p>
			</div>
			<hr>
		</div>
	</section>
	<footer>
		<p><b>oscar elizondo</b></p>
	</footer>

	<script src='bower_components/angular/angular.js'></script>
	<script src='bower_components/firebase/firebase.js'></script>
	<script src='dist/js/app.js'></script>
	<script src='dist/js/controllers/controller_1.js'></script>
</body>
</html>
